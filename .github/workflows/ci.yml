name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# self-hosted runner 安全：只跑同仓 PR（不执行外部 fork 的代码）
jobs:
  check:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, co-host]
    steps:
      - uses: actions/checkout@v4
      - name: Ensure node/pnpm on PATH
        run: echo "/root/.nvm/versions/node/v24.15.0/bin" >> "$GITHUB_PATH"
      - name: Install deps (warm store, offline)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm -r test
