name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# 只跑同仓 PR（不执行外部 fork 的代码）
jobs:
  unit:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate
      # 源码禁止裸控制字节（NUL 等）：会让 git 把文件判成二进制，diff/评审全盲。
      # 真需要控制字符时写 \u0000 转义（autoMerge.ts 的 glob 占位符踩过此坑）。
      - name: No raw control bytes in sources
        run: |
          if grep -rlP '[\x00-\x08\x0B\x0C\x0E-\x1F]' --include='*.ts' --include='*.tsx' packages/ ; then
            echo '::error::以上源码文件含裸控制字节（git 会判为二进制，diff 不可评审）——请改用 \u 转义'
            exit 1
          fi
      - name: Install deps (warm store, offline)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests with coverage
        run: pnpm test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: packages/*/coverage
          if-no-files-found: ignore

  st:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: unit
    env:
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
      RUNNER_SHARED_TOKEN: st-runner-token
      AUTH_SECRET: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate
      - name: Install deps (warm store, offline)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply database schema
        if: env.DATABASE_URL != ''
        run: pnpm --filter @co/server exec drizzle-kit push --force
      - name: System tests
        run: pnpm test:st
